name: Search Travel Spots

on:
  workflow_dispatch:
    inputs:
      country:
        description: 'Country to search (e.g., vietnam, morocco)'
        required: true
        default: 'vietnam'
      max_regions:
        description: 'Max regions to search in this run (0 = all remaining)'
        required: false
        default: '3'

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx trafilatura lxml_html_clean

      - name: Run search pipeline
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: |
          python3 scripts/run_pipeline.py \
            --country "${{ github.event.inputs.country }}" \
            --max-regions "${{ github.event.inputs.max_regions }}"

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A blogs/ search_progress.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new blogs found — nothing to commit"
          else
            COUNTRY="${{ github.event.inputs.country }}"
            git commit -m "Fetch blogs for ${COUNTRY} regions (automated)"
            git push
          fi
